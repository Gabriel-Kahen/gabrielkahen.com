<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Music listening dataset links by Gabriel Kahen">
    <meta name="author" content="Gabriel Kahen">
    <meta name="keywords" content="Gabriel Kahen, music listening dataset, Kaggle, Hugging Face, GitHub">
    <meta name="application-name" content="Gabriel Kahen Portfolio Site">

    <title>Music Dataset - Gabriel Kahen</title>
    <link rel="icon" type="image/x-icon" href="../icons/logo.png" alt="Gabriel Kahen">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,360;1,360&display=swap" rel="stylesheet">
</head>
<body>
    <div class="music-page-shell">
        <div class="music-browser-top">
            <a class="music-brand" href="../">
                <img src="../icons/logo.png" alt="Gabriel Kahen">
                <span>Gabriel Kahen</span>
            </a>
            <div class="music-address">gabrielkahen.com/music_data</div>
        </div>

        <main class="music-data-page">
            <img src="../icons/music.png" alt="" class="music-data-icon">
            <h1>Music Dataset</h1>
            <p>Choose where to view or download the music listening dataset.</p>

            <div class="music-data-links" aria-label="Music dataset locations">
                <a href="https://www.kaggle.com/datasets/gabrielkahen/music-listening-data-500k-users">
                    <strong>Kaggle</strong>
                    <span>Dataset page</span>
                </a>
                <a href="https://huggingface.co/datasets/GabeKahen/music-listening-profiles-500k">
                    <strong>Hugging Face</strong>
                    <span>Dataset repository</span>
                </a>
                <a href="https://github.com/Gabriel-Kahen/user_music_listening_dataset">
                    <strong>GitHub</strong>
                    <span>Source repository</span>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
